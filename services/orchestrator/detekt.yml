complexity:
  LongMethod:
    active: true
    threshold: 80
  LargeClass:
    active: true
    threshold: 600
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongParameterList:
    active: true
    # Factory fns for data classes with many fields (Run, Step) legitimately
    # take 7-8 parameters. Interfaces/classes still capped lower.
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    active: true
    thresholdInInterfaces: 15
    thresholdInClasses: 20
    thresholdInEnums: 15
    thresholdInObjects: 15

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
  WildcardImport:
    active: true
    excludes: []

performance:
  # Spring Boot entry point uses `runApplication<App>(*args)` idiomatically.
  SpreadOperator:
    active: false

naming:
  FunctionNaming:
    active: true
  ClassNaming:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: true
  SwallowedException:
    active: true
