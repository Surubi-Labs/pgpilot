complexity:
  LongMethod:
    active: true
    threshold: 80
  LargeClass:
    active: true
    threshold: 600
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongParameterList:
    active: true
    # Factory fns for domain data classes (Run, Step) with many fields
    # legitimately take 8-9 parameters. Static analysis for real bloat
    # kicks in at 10+.
    functionThreshold: 9
    constructorThreshold: 9
  TooManyFunctions:
    active: true
    thresholdInInterfaces: 15
    thresholdInClasses: 20
    thresholdInEnums: 15
    thresholdInObjects: 15

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
  WildcardImport:
    active: true
    excludes: []

performance:
  # Spring Boot entry point uses `runApplication<App>(*args)` idiomatically.
  SpreadOperator:
    active: false

naming:
  FunctionNaming:
    active: true
  ClassNaming:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: true
  SwallowedException:
    active: true
