name: pgpilot-dev

services:
  postgres:
    image: postgres:17.2-alpine
    container_name: pgpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pgpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgpilot}
      POSTGRES_DB: ${POSTGRES_DB:-pgpilot}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgpilot-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pgpilot} -d ${POSTGRES_DB:-pgpilot}"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=250

volumes:
  pgpilot-pg-data:
    name: pgpilot-pg-data
